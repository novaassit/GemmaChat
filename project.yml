name: GemmaChat
options:
  bundleIdPrefix: com.nova
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  llama.swift:
    url: https://github.com/mattt/llama.swift
    from: "2.8760.0"

targets:
  GemmaChat:
    type: application
    platform: iOS
    sources:
      - path: GemmaChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nova.gemmachat
        INFOPLIST_FILE: GemmaChat/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: llama.swift
        product: LlamaSwift
